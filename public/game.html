<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partie en cours — Loup-Garou</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🐺 Loup-Garou</h1>
      <div class="game-phase">
        <h2 id="phase-title">En attente…</h2>
        <p id="phase-description" style="color: var(--text-muted);"></p>
      </div>
    </header>

    <main>
      <!-- ① Révélation du rôle ─────────────────────────────────────────── -->
      <div id="role-reveal" class="card screen" style="display: none;">
        <div class="role-card">
          <div id="role-icon" style="font-size: 3rem; margin-bottom: 10px;"></div>
          <h2 id="role-name"></h2>
          <p id="role-description"></p>
        </div>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 15px;">
          Mémorisez votre rôle, il ne sera plus affiché ensuite.
        </p>
        <button id="hide-role-btn" class="btn btn-primary" style="margin-top: 15px;">J'ai vu mon rôle ✓</button>
      </div>

      <!-- ② Amoureux ───────────────────────────────────────────────────── -->
      <div id="lovers-reveal" class="card screen" style="display: none;">
        <div style="text-align: center; padding: 20px;">
          <p style="font-size: 3rem;">💕</p>
          <h2 id="lovers-title">Vous êtes amoureux !</h2>
          <p id="lovers-partner" style="color: var(--text-muted); margin-top: 10px;"></p>
        </div>
        <button id="lovers-ok-btn" class="btn btn-primary">Compris ✓</button>
      </div>

      <!-- ③ Attente joueur ─────────────────────────────────────────────────── -->
      <div id="waiting-screen" class="card screen">
        <div style="text-align: center; padding: 20px;">
          <p style="font-size: 2rem; margin-bottom: 10px;">⏳</p>
          <p id="waiting-text">En attente…</p>
        </div>
      </div>

      <!-- ④ Voyante : résultat (sur le téléphone de la voyante) ─────────── -->
      <div id="voyant-screen" class="card screen" style="display: none;">
        <div style="text-align:center; padding:20px;">
          <p style="font-size:2.5rem; margin-bottom:10px;">🔮</p>
          <p id="voyant-result-text" style="font-size:1.1rem; margin-bottom:20px;"></p>
          <button id="voyant-ok-btn" class="btn btn-secondary">Compris ✓</button>
        </div>
      </div>

      <!-- ⑤ Résultats nuit / élimination ──────────────────────────────── -->
      <div id="death-screen" class="card screen" style="display: none;">
        <h2 id="death-title">Résultats</h2>
        <div id="death-list" style="margin: 15px 0;"></div>
        <p id="death-continue" style="color: var(--text-muted); text-align: center;"></p>
      </div>

      <!-- ⑥ Fin de partie ──────────────────────────────────────────────── -->
      <div id="game-end-screen" class="card screen" style="display: none;">
        <div style="text-align: center; padding: 20px;">
          <p id="end-icon" style="font-size: 4rem;"></p>
          <h2 id="end-winner"></h2>
          <p id="end-subtitle" style="color: var(--text-muted); margin: 10px 0 20px;"></p>
          <div id="end-all-roles" style="margin-bottom: 20px;"></div>
          <button onclick="window.location.href='index.html'" class="btn btn-primary">
            Nouvelle partie
          </button>
        </div>
      </div>

      <!-- ⑦ Dashboard MJ ───────────────────────────────────────────────── -->
      <div id="mj-dashboard" class="card" style="display: none;">
        <h2>🎲 Dashboard MJ</h2>

        <!-- Liste des joueurs avec rôles (toujours visible) -->
        <div id="mj-players-list" style="margin-bottom: 20px;"></div>

        <!-- Contrôles nuit : sélection de cible par étape -->
        <div id="mj-night-controls" style="display: none;">
          <h3 id="mj-step-title" style="margin-bottom: 6px;"></h3>
          <p id="mj-step-desc" style="color: var(--text-muted); font-size: .9rem; margin-bottom: 14px;"></p>

          <!-- Grille joueurs (cupidon / voyante / loups) -->
          <div id="mj-selection-grid" class="player-grid"></div>

          <!-- Cupidon : compteur sélection -->
          <p id="mj-cupidon-hint" style="display:none; color:var(--text-muted); margin: 8px 0;">
            <span id="mj-cupidon-count">0/2</span> joueur(s) sélectionné(s)
          </p>

          <!-- Sorcière -->
          <div id="mj-sorciere-options" style="display: none;">
            <p id="mj-wolf-victim" style="color: var(--warning); margin-bottom: 12px;"></p>
            <div id="mj-heal-section">
              <button id="mj-heal-btn" class="btn btn-accent" style="margin-bottom: 8px;">
                💊 Sauver la victime (Potion de Vie)
              </button>
            </div>
            <div id="mj-kill-section" style="margin-top: 10px;">
              <p style="color: var(--text-muted); margin-bottom: 8px;">Potion de Mort — choisir une cible :</p>
              <div id="mj-kill-grid" class="player-grid"></div>
            </div>
            <button id="mj-sorciere-skip-btn" class="btn btn-secondary" style="margin-top: 12px;">
              Passer (ne rien faire)
            </button>
          </div>

          <!-- Résultat voyante (affiché au MJ après sélection) -->
          <div id="mj-voyant-result" style="display:none; background: var(--bg-card); border: 1px solid #2a2a4a; border-radius: 8px; padding: 14px; text-align: center; margin-bottom: 14px;">
            <p id="mj-voyant-result-text" style="font-size: 1.1rem;"></p>
          </div>

          <!-- Bouton confirmer (cupidon / voyante / loups / petite_fille) -->
          <button id="mj-confirm-night-btn" class="btn btn-primary" disabled style="margin-top: 14px; display: none;">
            Confirmer
          </button>
        </div>

        <!-- Contrôles jour : élimination directe -->
        <div id="mj-day-controls" style="display: none;">
          <h3 style="margin-bottom: 8px;">☀️ Élimination</h3>
          <p style="color: var(--text-muted); font-size: .9rem; margin-bottom: 14px;">
            Le village a voté. Qui est éliminé ?
          </p>
          <div id="mj-vote-grid" class="player-grid"></div>
          <button id="mj-no-elim-btn" class="btn btn-secondary" style="margin-top: 12px;">
            ⚖️ Égalité — personne n'est éliminé
          </button>
        </div>

        <!-- Contrôles chasseur : tir -->
        <div id="mj-chasseur-controls" style="display: none;">
          <h3 style="margin-bottom: 8px;">🏹 Tir du Chasseur</h3>
          <p id="mj-chasseur-msg" style="color: var(--warning); font-size: .9rem; margin-bottom: 14px;"></p>
          <div id="mj-chasseur-grid" class="player-grid"></div>
        </div>
      </div>
    </main>

    <div id="notification" class="notification"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/session.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
