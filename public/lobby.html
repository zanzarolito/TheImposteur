<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby — Loup-Garou</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Bandeau rôle du joueur actuel */
    .my-role-banner {
      text-align: center;
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-weight: 600;
      font-size: 1rem;
    }
    .my-role-banner.is-mj {
      background: linear-gradient(135deg, #b8860b, #e8b400);
      color: #1a1a2e;
    }
    .my-role-banner.is-player {
      background: var(--bg-card);
      border: 1px solid #2a2a4a;
      color: var(--text-muted);
    }

    /* Entrée MJ dans la liste */
    .player-list li.mj-entry {
      border-left: 3px solid #e8b400;
      font-weight: 600;
    }
    .player-list li .badge-mj {
      display: inline-block;
      font-size: 0.7rem;
      background: #e8b400;
      color: #1a1a2e;
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 8px;
      vertical-align: middle;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Chargement initial */
    #loading-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🐺 Salle d'attente</h1>
      <div style="text-align: center; margin-top: 15px;">
        <p style="color: var(--text-muted); margin-bottom: 5px;">Code de la salle :</p>
        <p id="room-code-display" style="font-size: 2rem; font-weight: bold; letter-spacing: 4px; margin-bottom: 10px;"></p>
        <button id="copy-btn" class="btn btn-small btn-secondary">📋 Copier le code</button>
      </div>
    </header>

    <main>
      <!-- Chargement -->
      <div id="loading-state" class="card">
        <p>⏳ Connexion à la salle…</p>
      </div>

      <!-- Contenu principal (masqué jusqu'à l'identification) -->
      <div id="lobby-content" style="display: none;">

        <!-- Bandeau identité du joueur actuel -->
        <div id="my-role-banner" class="my-role-banner"></div>

        <!-- Liste des joueurs -->
        <div class="card">
          <h2>Joueurs (<span id="player-count">0</span>/20 hors MJ)</h2>
          <ul id="player-list" class="player-list"></ul>
        </div>

        <!-- ═══ Panel MJ (caché pour les non-MJ) ═══ -->
        <div id="mj-panel" style="display: none;">
          <div class="card">
            <h2>⚙️ Composition des rôles</h2>

            <!-- Nombre de loups -->
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #2a2a4a; margin-bottom:6px;">
              <span>🐺 Loups-Garous</span>
              <div style="display:flex; align-items:center; gap:10px;">
                <button id="wolf-minus" class="btn btn-small btn-secondary" style="width:34px; padding:4px 0; font-size:1.2rem;">−</button>
                <span id="wolf-count" style="font-size:1.4rem; font-weight:bold; min-width:28px; text-align:center;">2</span>
                <button id="wolf-plus"  class="btn btn-small btn-secondary" style="width:34px; padding:4px 0; font-size:1.2rem;">+</button>
              </div>
            </div>
            <p style="color:var(--text-muted); font-size:0.82rem; margin-bottom:16px;">Conseil : 1 loup pour 3 joueurs</p>

            <!-- Rôles spéciaux -->
            <p style="font-weight:600; margin-bottom:10px;">Rôles spéciaux :</p>
            <div style="display:flex; flex-direction:column; gap:10px; margin-bottom:18px;">
              <label style="display:flex; align-items:center; gap:12px; cursor:pointer;">
                <input type="checkbox" id="check-voyante"  checked style="width:18px;height:18px;cursor:pointer;">
                <span>🔮 Voyante</span>
              </label>
              <label style="display:flex; align-items:center; gap:12px; cursor:pointer;">
                <input type="checkbox" id="check-sorciere" checked style="width:18px;height:18px;cursor:pointer;">
                <span>🧪 Sorcière</span>
              </label>
              <label style="display:flex; align-items:center; gap:12px; cursor:pointer;">
                <input type="checkbox" id="check-chasseur" style="width:18px;height:18px;cursor:pointer;">
                <span>🏹 Chasseur</span>
              </label>
              <label style="display:flex; align-items:center; gap:12px; cursor:pointer;">
                <input type="checkbox" id="check-cupidon"  style="width:18px;height:18px;cursor:pointer;">
                <span>💘 Cupidon</span>
              </label>
            </div>

            <!-- Villageois auto-calculés -->
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:var(--bg-card); border:1px solid #2a2a4a; border-radius:8px; margin-bottom:14px;">
              <span style="color:var(--text-muted);">👨‍🌾 Villageois (calculés automatiquement)</span>
              <span id="villager-count" style="font-size:1.4rem; font-weight:bold;">2</span>
            </div>

            <p id="comp-status" style="font-weight:600; margin:0;"></p>
          </div>

          <div class="card">
            <button id="test-btn" class="btn btn-secondary">🤖 Compléter avec des bots</button>
            <button id="start-btn" class="btn btn-primary" disabled>🎮 Lancer la partie</button>
          </div>
        </div>

        <!-- ═══ Panel joueur (visible pour les non-MJ) ═══ -->
        <div id="wait-panel" style="display: none;">
          <div class="card" style="text-align: center; padding: 30px;">
            <p style="font-size: 1.5rem; margin-bottom: 10px;">⏳</p>
            <p style="font-weight: 600; margin-bottom: 8px;">En attente du Maître du Jeu</p>
            <p id="wait-mj-name" style="color: var(--text-muted); font-size: 0.95rem;"></p>
          </div>
        </div>

      </div><!-- /lobby-content -->
    </main>

    <div id="notification" class="notification"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/session.js"></script>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const roomId  = params.get('room');
    if (!roomId) window.location.href = 'index.html';

    const socket  = io({ reconnection: true, reconnectionAttempts: 10 });
    let players   = [];
    let isMJ      = false;
    let myName    = '';
    let composition = {};

    let wolfCount = 2;

    document.getElementById('room-code-display').textContent = roomId;

    // ── Identify au (re)connect ───────────────────────────────────────────────
    socket.on('connect', () => {
      socket.emit('identify', { sessionToken: getOrCreateSessionToken(), roomId });
    });

    // ── Session restaurée ─────────────────────────────────────────────────────
    socket.on('sessionRestored', (data) => {
      isMJ    = data.isMJ;
      players = data.players;
      myName  = players.find(p => p.playerNumber === data.playerNumber)?.name || '';

      saveRoomContext(roomId, data.playerNumber, data.isMJ, false);
      revealLobby();
      updatePlayerList(players);
      if (isMJ) updateComposition();

      if (data.status === 'playing') {
        markGameStarted();
        window.location.href = `game.html?room=${roomId}`;
      }
    });

    // ── Session expirée ───────────────────────────────────────────────────────
    socket.on('sessionExpired', () => {
      clearRoomContext();
      window.location.href = 'index.html';
    });

    // ── Mise à jour joueurs ───────────────────────────────────────────────────
    socket.on('playersUpdate', ({ players: p }) => {
      players = p;
      updatePlayerList(players);
      if (isMJ) updateComposition();
    });

    // ── Partie lancée ─────────────────────────────────────────────────────────
    socket.on('gameStarted', () => {
      markGameStarted();
      window.location.href = `game.html?room=${roomId}`;
    });

    // ── Erreurs ───────────────────────────────────────────────────────────────
    socket.on('gameError', ({ message }) => showNotif(message, 'error'));
    socket.on('joinError', ({ message }) => {
      showNotif(message, 'error');
      setTimeout(() => { window.location.href = 'index.html'; }, 2500);
    });

    socket.on('compositionUpdated', ({ composition: c }) => { if (!isMJ) composition = c; });
    socket.on('testPlayersAdded', ({ count }) => showNotif(`${count} bot(s) ajouté(s)`, 'success'));

    // ── Affichage initial selon le rôle ───────────────────────────────────────
    function revealLobby() {
      document.getElementById('loading-state').style.display = 'none';
      document.getElementById('lobby-content').style.display = 'block';

      const banner = document.getElementById('my-role-banner');
      if (isMJ) {
        banner.textContent = '👑 Vous êtes le Maître du Jeu — configurez la partie ci-dessous';
        banner.className   = 'my-role-banner is-mj';
        document.getElementById('mj-panel').style.display  = 'block';
        document.getElementById('wait-panel').style.display = 'none';
      } else {
        const mj = players.find(p => p.isMJ);
        banner.textContent = '👤 Vous êtes joueur — en attente du Maître du Jeu';
        banner.className   = 'my-role-banner is-player';
        document.getElementById('mj-panel').style.display  = 'none';
        document.getElementById('wait-panel').style.display = 'block';
        if (mj) {
          document.getElementById('wait-mj-name').textContent = `Maître du Jeu : ${mj.name}`;
        }
      }
    }

    // ── Liste des joueurs ─────────────────────────────────────────────────────
    function updatePlayerList(list) {
      const ul = document.getElementById('player-list');
      ul.innerHTML = '';
      list.forEach(p => {
        const li = document.createElement('li');
        li.className = (p.online ? 'online' : '') + (p.isMJ ? ' mj-entry' : '');

        const nameSpan = document.createElement('span');
        nameSpan.textContent = p.name + (p.isBot ? ' 🤖' : '');

        // Badge MJ
        if (p.isMJ) {
          const badge = document.createElement('span');
          badge.className = 'badge-mj';
          badge.textContent = 'MJ';
          li.appendChild(nameSpan);
          li.appendChild(badge);
        } else {
          li.appendChild(nameSpan);
        }

        ul.appendChild(li);
      });
      const nonMJCount = list.filter(p => !p.isMJ).length;
      document.getElementById('player-count').textContent = nonMJCount;

      // Mettre à jour le nom du MJ dans le panel attente
      if (!isMJ) {
        const mj = list.find(p => p.isMJ);
        const el = document.getElementById('wait-mj-name');
        if (el && mj) el.textContent = `Maître du Jeu : ${mj.name}`;
      }
    }

    // ── Copier le code ────────────────────────────────────────────────────────
    document.getElementById('copy-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(roomId).then(() => showNotif('Code copié !', 'success'));
    });

    // ── Composition (MJ seulement) — Option A ────────────────────────────────

    function updateComposition() {
      if (!isMJ) return;
      const playerCount = players.filter(p => !p.isMJ).length;
      const specials = ['voyante', 'sorciere', 'chasseur', 'cupidon'];
      const specialCount = specials.filter(r => document.getElementById(`check-${r}`)?.checked).length;
      const villagers = playerCount - wolfCount - specialCount;

      // Bornes du curseur loups selon joueurs présents
      const maxWolves = Math.max(1, playerCount - specialCount - 1);
      if (wolfCount > maxWolves) wolfCount = maxWolves;
      if (wolfCount < 1) wolfCount = 1;
      document.getElementById('wolf-count').textContent = wolfCount;
      document.getElementById('wolf-minus').disabled = wolfCount <= 1;
      document.getElementById('wolf-plus').disabled  = wolfCount >= maxWolves;

      const villagerEl = document.getElementById('villager-count');
      const statusEl   = document.getElementById('comp-status');
      const startBtn   = document.getElementById('start-btn');
      if (!statusEl || !startBtn) return;

      villagerEl.textContent = Math.max(0, villagers);

      const valid = playerCount >= 6 && villagers >= 0;
      if (!valid) {
        statusEl.textContent = villagers < 0
          ? `Trop de rôles spéciaux (retirez-en ${-villagers})`
          : `Minimum 6 joueurs requis (${playerCount} actuellement)`;
        statusEl.style.color = 'var(--error)';
        startBtn.disabled = true;
        return;
      }

      statusEl.textContent = `✓ ${playerCount} rôles prêts à distribuer`;
      statusEl.style.color = 'var(--success)';
      startBtn.disabled = false;

      composition = { loup: wolfCount };
      if (villagers > 0) composition.villageois = villagers;
      specials.forEach(r => { if (document.getElementById(`check-${r}`)?.checked) composition[r] = 1; });
      socket.emit('setComposition', { roomId, composition });
    }

    // Boutons +/− loups
    document.getElementById('wolf-minus').addEventListener('click', () => {
      if (wolfCount > 1) { wolfCount--; updateComposition(); }
    });
    document.getElementById('wolf-plus').addEventListener('click', () => {
      wolfCount++;
      updateComposition();
    });

    // Checkboxes rôles spéciaux
    ['voyante', 'sorciere', 'chasseur', 'cupidon'].forEach(r => {
      document.getElementById(`check-${r}`)?.addEventListener('change', updateComposition);
    });

    document.getElementById('start-btn').addEventListener('click', () => {
      if (!isMJ) return;
      socket.emit('startGame', { roomId });
    });

    document.getElementById('test-btn').addEventListener('click', () => {
      if (!isMJ) return;
      socket.emit('addTestPlayers', { roomId });
    });

    // ── Notifications ─────────────────────────────────────────────────────────
    function showNotif(msg, type = 'info') {
      const n = document.getElementById('notification');
      n.textContent = msg;
      n.className = `notification ${type} show`;
      setTimeout(() => n.classList.remove('show'), 3500);
    }
  </script>
</body>
</html>
